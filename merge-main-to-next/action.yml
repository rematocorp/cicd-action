name: 'Automerge main → next'
description: 'On push to the main branch, merge it into an open release/* branch (or develop if no release is open). Auto-resolves package.json "version"-line conflicts only.'
branding:
  icon: 'git-merge'
  color: 'blue'

inputs:
  github-token:
    description: 'Token with contents:write and pull-requests:write. Defaults to GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}
  main-branch:
    description: 'The production branch name. Must match the consumer workflow trigger.'
    required: false
    default: 'main'
  develop-branch:
    description: 'The development branch name.'
    required: false
    default: 'develop'
  release-branch-prefix:
    description: 'Prefix identifying release branches (must match the consumer trigger pattern, e.g. release/).'
    required: false
    default: 'release/'
  version-conflict-files:
    description: 'Newline-separated list of package.json-style files whose "version" line is safe to auto-resolve to HEAD. Empty disables auto-resolution.'
    required: false
    default: |
      frontend/package.json
      backend/package.json
  git-user-name:
    description: 'Git author name for merge commits. Required.'
    required: true
  git-user-email:
    description: 'Git author email for merge commits. Required.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Merge main into next branch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_MAIN_BRANCH: ${{ inputs.main-branch }}
        INPUT_DEVELOP_BRANCH: ${{ inputs.develop-branch }}
        INPUT_RELEASE_BRANCH_PREFIX: ${{ inputs.release-branch-prefix }}
        INPUT_VERSION_CONFLICT_FILES: ${{ inputs.version-conflict-files }}
        INPUT_GIT_USER_NAME: ${{ inputs.git-user-name }}
        INPUT_GIT_USER_EMAIL: ${{ inputs.git-user-email }}
      run: bash "${{ github.action_path }}/../scripts/automerge_main.sh"
